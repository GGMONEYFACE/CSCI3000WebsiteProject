<!DOCTYPE html>
<html>
<head>
    <title>Christian Karate Academy Federation - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/IMG_0507.jpg" type="image/x-icon">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<header>
    <h1>Login</h1>
    <nav class="header-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="locations.html">Locations</a></li>
            <li><a href="verses.html">Verses</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<div class="content">
    <h2>Member Access</h2>
    <p>Sign in to your account or create a new one:</p>
    
    <div class="auth-toggle">
        <button id="login-tab" class="tab active">Login</button>
        <button id="signup-tab" class="tab">Sign Up</button>
    </div>
    
    <div class="login-container">
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" name="password" required>
            </div>
            
            <div class="form-group checkbox">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me</label>
            </div>
            
            <button type="submit" class="auth-button">Sign In</button>
            
            <div class="form-links">
                <a href="#" id="forgot-password">Forgot password?</a>
            </div>
        </form>
        
        <form id="signup-form" class="auth-form hidden">
            <div class="form-group">
                <label for="signup-name">Full Name:</label>
                <input type="text" id="signup-name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="signup-email">Email:</label>
                <input type="email" id="signup-email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="signup-password">Password:</label>
                <input type="password" id="signup-password" name="password" required>
                <small>Password must be at least 8 characters with uppercase, lowercase, number, and special character.</small>
            </div>
            
            <div class="form-group">
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirmPassword" required>
            </div>
            
 <!--           <div class="form-group checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="#" target="_blank">Terms of Service</a></label>
            </div>
        -->           
            <button type="submit" class="auth-button">Create Account</button>
        </form>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
