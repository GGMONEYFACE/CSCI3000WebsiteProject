<!DOCTYPE html>
<html>
<head>
    <title>Christian Karate Academy Federation - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/IMG_0507.jpg" type="image/x-icon">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<header>
    <h1>Login</h1>
    <button id="menu-button">
        <span></span>
        <span></span>
        <span></span>
    </button>
</header>

<div id="sliding-menu" class="sliding-menu">
    <div class="menu-content">
        <div class="menu-line"><a href="index.html">home</a> <a href="locations.html">locations</a> <a href="verses.html">verses</a> <a href="login.html">login</a></div>
    </div>
</div>

<div class="content">
    <h2>Member Login</h2>
    <p>Sign in to access your member account:</p>
    
    <div class="login-container">
        <form class="login-form">
            <div class="form-group">
                <label for="email">Email or Username:</label>
                <input type="text" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group checkbox">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember me</label>
            </div>
            
            <button type="submit" class="login-button">Sign In</button>
            
            <div class="login-links">
                <a href="#">Forgot password?</a>
                <span>•</span>
                <a href="#">Create account</a>
            </div>
        </form>
    </div>
</div>

<script src="menu.js"></script>
</body>
</html>
