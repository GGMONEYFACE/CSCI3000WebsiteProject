<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox: Verse Dropdowns</title>
    <link rel="stylesheet" href="../header.css">
    <link rel="stylesheet" href="../verses.css">
    <link rel="icon" href="../images/IMG_0507.jpg" type="image/x-icon">
</head>
<body>
    <header>
    <h1>KIAI!</h1>
    <nav class="header-nav">
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="../locations.html">Locations</a></li>
            <li><a href="../verses.html">Verses</a></li>
            <li><a href="../login.html">Login</a></li>
        </ul>
    </nav>
</header>
    <link rel="stylesheet" href=".dropdown-boxes.css">
<div class="sandbox-container">
    <h1>Verse Dropdown Demo</h1>
    <div class="dropdown-card" data-reference="Proverbs 22:6" data-verse="Train up a child in the way he should go; even when he is old he will not depart from it." data-attr="ESV">
        <button class="dropdown-trigger" aria-expanded="false">
            <span>Proverbs 22:6</span>
            <span class="icon">▼</span>
        </button>
        <div class="dropdown-content" aria-hidden="true"></div>
    </div>

    <div class="dropdown-card" data-reference="Philippians 4:13" data-verse="I can do all things through Christ who strengthens me." data-attr="KJV">
        <button class="dropdown-trigger" aria-expanded="false">
            <span>Philippians 4:13</span>
            <span class="icon">▼</span>
        </button>
        <div class="dropdown-content" aria-hidden="true"></div>
    </div>

    <div class="dropdown-card" data-reference="Joshua 1:9" data-verse="Have I not commanded you? Be strong and courageous. Do not be frightened, and do not be dismayed, for the Lord your God is with you wherever you go." data-attr="ESV">
        <button class="dropdown-trigger" aria-expanded="false">
            <span>Joshua 1:9</span>
            <span class="icon">▼</span>
        </button>
        <div class="dropdown-content" aria-hidden="true"></div>
    </div>

    <div class="dropdown-card" data-reference="2 Timothy 2:2" data-verse="And the things you have heard me say in the presence of many witnesses entrust to reliable people who will also be qualified to teach others." data-attr="NIV">
        <button class="dropdown-trigger" aria-expanded="false">
            <span>2 Timothy 2:2</span>
            <span class="icon">▼</span>
        </button>
        <div class="dropdown-content" aria-hidden="true"></div>
    </div>
</div>

<script>
    const cards = document.querySelectorAll('.dropdown-card');

    cards.forEach(card => {
        const trigger = card.querySelector('.dropdown-trigger');
        const content = card.querySelector('.dropdown-content');

        const verseText = card.getAttribute('data-verse');
        const attribution = card.getAttribute('data-attr');

        content.innerHTML = `<p>“${verseText}”<span class="verse-attr"> - ${attribution}</span></p>`;

        trigger.addEventListener('click', () => {
            const isOpen = trigger.getAttribute('aria-expanded') === 'true';

            cards.forEach(c => {
                c.classList.remove('active');
                c.querySelector('.dropdown-trigger').setAttribute('aria-expanded', 'false');
                c.querySelector('.dropdown-content').classList.remove('open');
                c.querySelector('.dropdown-content').setAttribute('aria-hidden', 'true');
            });

            if (!isOpen) {
                card.classList.add('active');
                trigger.setAttribute('aria-expanded', 'true');
                content.classList.add('open');
                content.setAttribute('aria-hidden', 'false');
            }
        });
    });
</script>
</body>
</html>
